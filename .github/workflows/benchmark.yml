name: Benchmark Pass
on:
  workflow_dispatch:
    inputs:
      suffix:
        description: 'Optional run suffix (e.g. "v2")'
        required: false

permissions:
  contents: read

jobs:
  preflight-and-baseline:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      run_dir: ${{ steps.setup.outputs.run_dir }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache ThoughtJack binary
        id: cache-thoughtjack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/thoughtjack
          # Invalidate when the requested version (in config.yaml) changes.
          key: thoughtjack-${{ runner.os }}-${{ hashFiles('config.yaml') }}-v1

      - name: Install ThoughtJack
        if: steps.cache-thoughtjack.outputs.cache-hit != 'true'
        run: cargo install thoughtjack --version $(grep version_required config.yaml | head -1 | awk '{print $2}' | tr -d '"')

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Phases 0-3
        id: setup
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          ./pipeline/run.sh --ci --phases 0,1,2,3 \
            ${{ inputs.suffix && format('--suffix {0}', inputs.suffix) || '' }}
          echo "run_dir=$(ls -d runs/*/)" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: run-state
          path: ${{ steps.setup.outputs.run_dir }}

  execute-openai:
    needs: preflight-and-baseline
    runs-on: ubuntu-24.04
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/download-artifact@v4
        with:
          name: run-state
          path: ${{ needs.preflight-and-baseline.outputs.run_dir }}
      - name: Cache ThoughtJack binary
        id: cache-thoughtjack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/thoughtjack
          key: thoughtjack-${{ runner.os }}-${{ hashFiles('config.yaml') }}-v1
      - name: Install ThoughtJack
        if: steps.cache-thoughtjack.outputs.cache-hit != 'true'
        run: cargo install thoughtjack --version $(grep version_required config.yaml | head -1 | awk '{print $2}' | tr -d '"')
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Execute OpenAI models
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: ./pipeline/run.sh --ci --phases 4 --provider openai --resume
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-openai
          path: |
            ${{ needs.preflight-and-baseline.outputs.run_dir }}/results/
            ${{ needs.preflight-and-baseline.outputs.run_dir }}/utility-results/

  execute-anthropic:
    needs: preflight-and-baseline
    runs-on: ubuntu-24.04
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/download-artifact@v4
        with:
          name: run-state
          path: ${{ needs.preflight-and-baseline.outputs.run_dir }}
      - name: Cache ThoughtJack binary
        id: cache-thoughtjack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/thoughtjack
          key: thoughtjack-${{ runner.os }}-${{ hashFiles('config.yaml') }}-v1
      - name: Install ThoughtJack
        if: steps.cache-thoughtjack.outputs.cache-hit != 'true'
        run: cargo install thoughtjack --version $(grep version_required config.yaml | head -1 | awk '{print $2}' | tr -d '"')
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Execute Anthropic models
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: ./pipeline/run.sh --ci --phases 4 --provider anthropic --resume
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-anthropic
          path: |
            ${{ needs.preflight-and-baseline.outputs.run_dir }}/results/
            ${{ needs.preflight-and-baseline.outputs.run_dir }}/utility-results/

  execute-google:
    needs: preflight-and-baseline
    runs-on: ubuntu-24.04
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/download-artifact@v4
        with:
          name: run-state
          path: ${{ needs.preflight-and-baseline.outputs.run_dir }}
      - name: Cache ThoughtJack binary
        id: cache-thoughtjack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/thoughtjack
          key: thoughtjack-${{ runner.os }}-${{ hashFiles('config.yaml') }}-v1
      - name: Install ThoughtJack
        if: steps.cache-thoughtjack.outputs.cache-hit != 'true'
        run: cargo install thoughtjack --version $(grep version_required config.yaml | head -1 | awk '{print $2}' | tr -d '"')
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Execute Google models
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: ./pipeline/run.sh --ci --phases 4 --provider google --resume
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-google
          path: |
            ${{ needs.preflight-and-baseline.outputs.run_dir }}/results/
            ${{ needs.preflight-and-baseline.outputs.run_dir }}/utility-results/

  execute-xai:
    needs: preflight-and-baseline
    runs-on: ubuntu-24.04
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/download-artifact@v4
        with:
          name: run-state
          path: ${{ needs.preflight-and-baseline.outputs.run_dir }}
      - name: Cache ThoughtJack binary
        id: cache-thoughtjack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/thoughtjack
          key: thoughtjack-${{ runner.os }}-${{ hashFiles('config.yaml') }}-v1
      - name: Install ThoughtJack
        if: steps.cache-thoughtjack.outputs.cache-hit != 'true'
        run: cargo install thoughtjack --version $(grep version_required config.yaml | head -1 | awk '{print $2}' | tr -d '"')
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Execute xAI models
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: ./pipeline/run.sh --ci --phases 4 --provider xai --resume
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-xai
          path: |
            ${{ needs.preflight-and-baseline.outputs.run_dir }}/results/
            ${{ needs.preflight-and-baseline.outputs.run_dir }}/utility-results/

  execute-openrouter:
    needs: preflight-and-baseline
    runs-on: ubuntu-24.04
    # OpenRouter has the most models (~half the lineup) and the slowest tail
    # latency due to provider-side routing variance. Bumped to 180m for headroom
    # on monthly unattended runs at runs_per_scenario=5.
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/download-artifact@v4
        with:
          name: run-state
          path: ${{ needs.preflight-and-baseline.outputs.run_dir }}
      - name: Cache ThoughtJack binary
        id: cache-thoughtjack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/thoughtjack
          key: thoughtjack-${{ runner.os }}-${{ hashFiles('config.yaml') }}-v1
      - name: Install ThoughtJack
        if: steps.cache-thoughtjack.outputs.cache-hit != 'true'
        run: cargo install thoughtjack --version $(grep version_required config.yaml | head -1 | awk '{print $2}' | tr -d '"')
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Execute OpenRouter models
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: ./pipeline/run.sh --ci --phases 4 --provider openrouter --resume
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-openrouter
          path: |
            ${{ needs.preflight-and-baseline.outputs.run_dir }}/results/
            ${{ needs.preflight-and-baseline.outputs.run_dir }}/utility-results/

  score-and-publish:
    needs: [preflight-and-baseline, execute-openai, execute-anthropic, execute-google, execute-xai, execute-openrouter]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    # Run even if some execute jobs failed/timed-out so partial scoring still
    # surfaces in logs. Phase 5 integrity check still gates PR creation; if
    # completeness is below 90% phase 5 fails and the Create PR step is
    # skipped (a notify-failure issue is opened from the failure-notify job).
    if: always() && needs.preflight-and-baseline.result == 'success'
    env:
      RUN_DIR: ${{ needs.preflight-and-baseline.outputs.run_dir }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/download-artifact@v4
        with:
          name: run-state
          path: ${{ env.RUN_DIR }}

      - uses: actions/download-artifact@v4
        with:
          pattern: results-*
          path: ${{ env.RUN_DIR }}/
          merge-multiple: true

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Phases 5-8
        run: ./pipeline/run.sh --ci --phases 5,6,7,8

      - name: Build PR body with provenance
        id: pr_body
        run: |
          META="$RUN_DIR/metadata.json"
          INTEGRITY="$RUN_DIR/integrity.json"
          {
            echo "## Provenance"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Run date | \`$(jq -r '.date // "?"' "$META")\` |"
            echo "| ThoughtJack version | \`$(jq -r '.thoughtjack_version // "?"' "$META")\` |"
            echo "| Scenario library commit | \`$(jq -r '.scenario_commit // "?"' "$META")\` |"
            echo "| Benchmark repo commit | \`$(jq -r '.benchmark_commit // "?"' "$META")\` |"
            echo "| Runs per scenario | \`$(jq -r '.runs_per_scenario // "?"' "$META")\` |"
            if [[ -f "$INTEGRITY" ]]; then
              echo "| Integrity check | \`$(jq -r '.overall // "?"' "$INTEGRITY")\` |"
            fi
            echo ""
            echo "## Workflow"
            echo ""
            echo "- Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- See report in \`$RUN_DIR/report.md\`"
            echo "- See findings in \`$RUN_DIR/findings.md\`"
            echo "- See integrity in \`$RUN_DIR/integrity.json\`"
          } > /tmp/pr-body.md
          cat /tmp/pr-body.md

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: benchmark/${{ github.run_id }}
          title: "Benchmark pass — ${{ env.RUN_DIR }}"
          body-path: /tmp/pr-body.md
          commit-message: "results: benchmark pass"
          add-paths: runs/

  notify-failure:
    needs: [preflight-and-baseline, execute-openai, execute-anthropic, execute-google, execute-xai, execute-openrouter, score-and-publish]
    runs-on: ubuntu-24.04
    if: failure()
    permissions:
      issues: write
    steps:
      - name: Open failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const failedJobs = [];
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            for (const job of jobs.data.jobs) {
              if (job.conclusion === 'failure' || job.conclusion === 'cancelled' || job.conclusion === 'timed_out') {
                failedJobs.push(`- **${job.name}** (${job.conclusion})`);
              }
            }
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Benchmark run failed (run ${context.runId})`,
              labels: ['benchmark-failure', 'automation'],
              body: [
                `Automated benchmark workflow failed.`,
                ``,
                `**Workflow run:** ${runUrl}`,
                ``,
                `**Failed/cancelled/timed-out jobs:**`,
                ...failedJobs,
                ``,
                `Check the workflow run for logs and uploaded result artifacts (per-provider results-* artifacts are retained even on partial failures).`,
              ].join('\n'),
            });
